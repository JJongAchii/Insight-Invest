# API 배포 — 서버 코드 변경 시 Lambda 컨테이너 재빌드·재배포 (재구조 2026-07)
#
# 필요한 repo secrets:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY  — ECR push + CFN deploy 권한
#   GH_PAT                                     — quant-data(private) 읽기용 PAT
#   API_TOKEN                                  — X-API-Key 앱 토큰

name: deploy-api

on:
  push:
    branches: [main]
    paths: ["server/**", "infra/**", ".github/workflows/deploy.yml"]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPO: insight-invest-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          echo "${{ secrets.GH_PAT }}" > /tmp/ghtoken
          DOCKER_BUILDKIT=1 docker build \
            --secret id=gh_token,src=/tmp/ghtoken \
            -t ${{ steps.ecr.outputs.registry }}/$ECR_REPO:${{ github.sha }} server/
          docker push ${{ steps.ecr.outputs.registry }}/$ECR_REPO:${{ github.sha }}
          DIGEST=$(aws ecr describe-images --repository-name $ECR_REPO \
            --image-ids imageTag=${{ github.sha }} \
            --query 'imageDetails[0].imageDigest' --output text)
          echo "IMAGE_URI=${{ steps.ecr.outputs.registry }}/$ECR_REPO@$DIGEST" >> $GITHUB_ENV

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name insight-invest-api \
            --template-file infra/template.yaml \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides ImageUri=$IMAGE_URI ApiToken=${{ secrets.API_TOKEN }} \
            --no-fail-on-empty-changeset

      - name: Smoke test
        run: |
          URL=$(aws cloudformation describe-stacks --stack-name insight-invest-api \
            --query 'Stacks[0].Outputs[?OutputKey==`FunctionUrl`].OutputValue' --output text)
          curl -sf "$URL/health" | grep healthy
